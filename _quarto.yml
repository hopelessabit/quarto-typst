# ============================================================
# Quarto Project Configuration
# File: _quarto.yml
#
# Purpose:
# - Define this folder as a Quarto project.
# - Render all lesson files under lessons/.
# - Send all generated files to _output/.
# - Use Typst as the default PDF engine.
# - Use one global Typst template for every lesson.
# ============================================================

project:
  # "default" means this is a normal multi-document project.
  # We do not use "book" because each lesson should become its own PDF.
  type: default

  # All rendered PDFs will be placed here.
  # This keeps source files clean.
  output-dir: _output

  # Render all .qmd files inside lessons/.
  # Example matched file:
  # lessons/grade-8/buoi-22-on-tap-dai-so/index.qmd
  render:
    - lessons/**/*.qmd


# ============================================================
# Shared metadata files
# ============================================================

metadata-files:
  # Later we will create this file.
  # It will contain global variables such as teacher name,
  # brand name, colors, and default lesson settings.
  - _variables.yml


# ============================================================
# Default output format
# ============================================================

format:
  typst:
    # Use the global Typst template.
    template: typst/template.typ

    # Use a custom Lua filter to inject variables from _variables.yml into the Typst template.
    filters: 
      - filters/lesson.lua

    # Basic page settings.
    papersize: a4

    # We do not need automatic table of contents for worksheet lessons.
    toc: false

    # Disable automatic heading numbering.
    number-sections: false

    # Default font.
    mainfont: "Times New Roman"

    # Default text size.
    fontsize: 11pt

    # Default page margin.
    margin:
      x: 1.5cm
      y: 1.5cm

    # Don't keep the intermediate .typ files generated by Quarto to keep the project clean
    keep-typ: false


# ============================================================
# Execution behavior
# ============================================================

execute:
  # Hide code if there is executable code later.
  echo: false

  # Hide warnings in rendered PDF.
  warning: false

  # Hide messages in rendered PDF.
  message: false
  
  # Stop rendering if there is an error in code execution.
  error: true